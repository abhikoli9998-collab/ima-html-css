<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>id card</title>
    <style>
        * {
            margin: 10px;
            border-radius: 40px;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #3081c7, #8f9fa0);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .id {
            width: 350px;
            background: #c6ecba;
            border: solid black;
            text-align: center;
            padding: 25px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2)
        }

        .img {
            border-radius: 0%;
            border: 4px solid #301f5b;
        }

        h2 {
            color: #333;
            margin-bottom: 10px;
        }

        .college {
            color: #666;
            font-size: 18px;
            margin-bottom: 15px;
        }

        .abhi {
            margin: 15px 0;
            color: #555;
            margin-top: 10px;
        }
        .button {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 20px;
            background: #d7205a;
            color: white;
            text-decoration: none;
            border-radius: 0px;
        }
    </style>
</head>

<body>
    <div class="id">
        <img width="150" height="100"
            src="https://static.wikia.nocookie.net/naruto/images/d/dd/Naruto_Uzumaki%21%21.png/revision/latest?cb=20161013233552"
            class="img">
        <h1>Abhishek Koli</h1>

        <p class="college">BCA Pursuing</p>
        <div class="abhi">
            <p><strong>Student</strong></p>
            <p>Full stack Development</p>
            <p>2216</p>

        </div>
        <a href="#" class="button">View ID Crad</a>
    </div>

</body>

</html>
