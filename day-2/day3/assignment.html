<!DOCTYPE html>
<html>
<head>
    
    <title>Job Application Form </title>
</head>
<body>
    <form>
        <table> 
    <h2>Job Application Form </h2>
    <hr>
    <tr>
        <td><label>Full Name:</label><br></td>
        <td><input type="text"placeholder="name"><br><br></td>
    </tr>
    <tr>
        <td><label>Email:</label><br></td>
        <td><input type="email" placeholder="email"><br><br></td>
    </tr>
    <tr>
        <td><label>Password:</label><br></td>
        <td><input type="password" placeholder="password"><br><br></td>
    </tr>
    <tr>
        <td><label>Mobile Number:</label><br></td>
        <td><input type="tel" placeholder="mobile"><br><br></td>
    </tr>
    <tr>
        <td><label>Date of Birth:</label><br></td>
        <td><input type="date" name="dob"><br></td>
    </tr> </table><hr>

        <label>Gender:</label><br>
        <input type="radio" name="gender" value="Male"> Male
        <input type="radio" name="gender" value="Female"> Female
        <br><br>
        <h2>Education Details </h2>
        <input type="text" placeholder="Enter your highest degree"><br>
        <input type="text" placeholder="Enter your college name"><br>
        <label>Passing Year:</label>
        <select><option value="select">Select Year</option>
            <option value="2024">2024</option>
            <option value="2025">2025</option>
            <option value="2026">2026</option>
        </select> <br><hr>
        <h2>Skills</h2>
        <input type="checkbox" name="skills"> html
        <input type="checkbox" name="skills">css
        <input type="checkbox" name="skills" > JavaScript
        <input type="checkbox" name="skills" > Python
       <br><br><hr>
        <h2>Upload Resume</h2>
        <input type="file" name="resume"><br><br>
        <input type="submit" value="Submit">
        <input type="reset" value="Reset">
    </form>
        
</body>
</html>
