<!DOCTYPE html>
<html>

<head>
    <title>Order/Delivery Tracking</title>
    <link rel="stylesheet" href="assignment-1.css">
</head>

<body>
    <form>
        <fieldset>
            <legend>order/delivery Tracking</legend>
            <h3>Track your order</h3>
            <hr>
            <table>
                <h3>Personal Information</h3>
                <hr>
                <tr>
                    <td><label for="name">Name:</label><br></td>
                    <td><input id="name" type="text" placeholder="Enter your name"><br><br></td>
                </tr>
                <tr>
                    <td><label for="email">Email:</label><br></td>
                    <td><input id="email" type="email" placeholder="Enter your email"><br><br></td>
                </tr>
                <tr>
                    <td><label for="mobile">Mobile Number:</label><br><br></td>
                    <td><input id="mobile" type="tel" placeholder="Enter your mobile number"><br><br></td>
                </tr>
            </table>
            <h3>order information</h3>
            <hr>
            <table>
                <tr>
                    <td><label for="orderid">Order ID:</label></td>
                    <td>
                        <input id="orderid" type="text" placeholder="Enter your order ID"><br><br>
                    </td>
                </tr>
                <tr>
                    <td><label for="destination">Delivery Destination:</label><br><br></td>
                    <td>
                        <input id="destination" type="text" placeholder="Enter delivery destination"><br><br>
                    </td>
                </tr>
            </table>
            <table>
                <tr>
                    <td><label for="street">Street Address:</label><br></td>
                    <td><input id="street" type="text" placeholder="Enter your street address"><br><br></td>
                </tr>
                <tr>
                    <td><label for="address">Address Line 2:</label><br></td>
                    <td><input id="address" type="text" placeholder="Enter your address line 2"><br><br></td>
                </tr>
                <tr>
                    <td><label for="city">City:</label></td>
                    <td><input id="city" type="text" placeholder="Enter your city"></td>
                    <td><label for="state">State/region/province:</label></td>
                    <td><input id="state" type="text" placeholder="Enter your state"></td>
                </tr>
                <tr>
                    <td><label for="postal">Postal Code:</label></td>
                    <td><input id="postal" type="text" placeholder="Enter your postal code"></td>
                    <td><label for="country">Country:</label></td>
                    <td><input id="country" type="text" placeholder="Enter your country"></td>
                </tr>
                <tr>
                    <td><br><label for="orderdate">When did you place <br>
                            your order?</label></td>
                    <td><input type="date" id="orderdate" name="orderdate"></td>
                </tr>
            </table>
            <br>
              
            <input type="submit" value="Submit">
            
        </fieldset>
    </form>
</body>

</html>
